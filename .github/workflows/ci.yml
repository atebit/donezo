name: CI

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ---------------------------------------------------------------------------
# All 9 jobs run in parallel (no needs: dependencies for v1).
# Each job rebuilds the pnpm install from cache independently.
# Jobs that need Supabase use the .github/actions/setup-supabase composite.
# ---------------------------------------------------------------------------

jobs:
  # -------------------------------------------------------------------------
  # 1. lint — biome check (linting + formatting)
  # -------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Lint
        run: pnpm lint

  # -------------------------------------------------------------------------
  # 2. typecheck — tsc --noEmit
  # -------------------------------------------------------------------------
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Typecheck
        run: pnpm typecheck

  # -------------------------------------------------------------------------
  # 3. build — next build (with Supabase env vars for compile-time checks)
  # -------------------------------------------------------------------------
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Build
        run: pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}

  # -------------------------------------------------------------------------
  # 4. unit — Vitest (no Supabase required)
  # -------------------------------------------------------------------------
  unit:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - name: Run unit tests
        run: pnpm test

  # -------------------------------------------------------------------------
  # 5. policies — pgTAP RLS policy tests against local Supabase
  # -------------------------------------------------------------------------
  policies:
    name: Policy tests (pgTAP)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-supabase

      - name: Install pg_prove (TAP::Parser::SourceHandler::pgTAP)
        run: |
          sudo apt-get install -y cpanminus libtap-parser-sourcehandler-pgtap-perl || \
          sudo cpanm TAP::Parser::SourceHandler::pgTAP

      - name: Run policy tests
        run: pnpm test:policies:ci

  # -------------------------------------------------------------------------
  # 6. e2e — Playwright against local Supabase + Next.js server
  # -------------------------------------------------------------------------
  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-supabase

      - name: Apply migrations and seed
        run: supabase db reset --local --yes

      - name: Export local Supabase credentials
        run: |
          supabase status -o env > /tmp/supabase.env
          cat /tmp/supabase.env
          # `supabase status -o env` wraps values in double quotes (KEY="VALUE").
          # GITHUB_ENV stores the literal RHS — quotes and all — which breaks
          # z.string().url() validation when the app boots. Strip the quotes
          # before writing the GITHUB_ENV entries.
          grep -E '^(API_URL|ANON_KEY|SERVICE_ROLE_KEY)=' /tmp/supabase.env | \
            sed 's/^API_URL=/NEXT_PUBLIC_SUPABASE_URL=/' | \
            sed 's/^ANON_KEY=/NEXT_PUBLIC_SUPABASE_ANON_KEY=/' | \
            sed 's/^SERVICE_ROLE_KEY=/SUPABASE_SERVICE_ROLE_KEY=/' | \
            sed -E 's/^([A-Z_]+)="(.*)"$/\1=\2/' >> "$GITHUB_ENV"
          # Provide the site URL required by lib/env.ts; the webServer runs
          # on localhost:3000 in CI per playwright.config.ts.
          echo "NEXT_PUBLIC_SITE_URL=http://localhost:3000" >> "$GITHUB_ENV"

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run E2E tests
        run: pnpm test:e2e
        env:
          CI: "true"
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  # -------------------------------------------------------------------------
  # 7. drift — schema drift check (supabase db diff must be empty)
  # -------------------------------------------------------------------------
  drift:
    name: Schema drift check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node
      - uses: ./.github/actions/setup-supabase

      - name: Reset DB with local migrations
        run: supabase db reset --local --yes

      - name: Check for schema drift
        run: |
          # `supabase db diff` writes status/progress to stderr and the
          # diff SQL (or "No schema changes found") to stdout. Capture
          # stdout only so we are not fooled by informational chatter.
          DIFF=$(supabase db diff 2>/dev/null || true)
          # Treat the human-readable success line as no-drift.
          DIFF_CLEAN=$(printf '%s\n' "$DIFF" | grep -v '^No schema changes found$' | sed '/^[[:space:]]*$/d')
          if [ -n "$DIFF_CLEAN" ]; then
            echo "::error::Schema drift detected — migrations are out of sync with the local schema."
            echo ""
            printf '%s\n' "$DIFF"
            exit 1
          fi
          echo "No schema drift detected."

  # -------------------------------------------------------------------------
  # 8. bundle — build with ANALYZE=true and post size table as PR comment.
  #    Soft-fail on regression (report only, no enforced budget in v1).
  #    Skipped on push to main (only meaningful on PRs).
  # -------------------------------------------------------------------------
  bundle:
    name: Bundle size analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    permissions:
      contents: read
      pull-requests: write
    # Per dispatch plan Q2: bundle is a soft gate in v1 (report only, no hard fail).
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node

      - name: Build with bundle analyzer
        run: ANALYZE=true pnpm build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_ANON_KEY }}
        continue-on-error: true

      - name: Parse bundle sizes and post PR comment
        if: always()
        uses: actions/github-script@v7
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const path = require('path');

            // Read the Next.js build manifest for client bundle sizes
            let sizeTable = '## Bundle Size Report\n\n';

            try {
              const manifestPath = '.next/build-manifest.json';
              if (!fs.existsSync(manifestPath)) {
                sizeTable += '_Build manifest not found — analyzer may have failed._\n';
              } else {
                const manifest = JSON.parse(fs.readFileSync(manifestPath, 'utf8'));
                const pages = manifest.pages || {};

                // Collect all unique client JS files and their sizes
                const allFiles = new Set();
                for (const files of Object.values(pages)) {
                  for (const f of files) {
                    if (f.endsWith('.js')) allFiles.add(f);
                  }
                }

                let totalSize = 0;
                const fileSizes = [];
                for (const f of allFiles) {
                  const fullPath = path.join('.next', f);
                  if (fs.existsSync(fullPath)) {
                    const size = fs.statSync(fullPath).size;
                    totalSize += size;
                    fileSizes.push({ file: f, size });
                  }
                }

                fileSizes.sort((a, b) => b.size - a.size);

                sizeTable += `**Total client JS:** ${(totalSize / 1024).toFixed(1)} KB\n\n`;
                sizeTable += '| File | Size |\n|---|---|\n';
                for (const { file, size } of fileSizes.slice(0, 20)) {
                  sizeTable += `| \`${file}\` | ${(size / 1024).toFixed(1)} KB |\n`;
                }
                if (fileSizes.length > 20) {
                  sizeTable += `| _…and ${fileSizes.length - 20} more_ | |\n`;
                }
                sizeTable += '\n_No enforced budget in v1 — report only._\n';
              }
            } catch (err) {
              sizeTable += `_Error reading bundle data: ${err.message}_\n`;
            }

            // Upload analyzer HTML as artifact comment note
            const analyzeDir = '.next/analyze';
            if (fs.existsSync(analyzeDir)) {
              sizeTable += '\n> Analyzer HTML reports uploaded as workflow artifacts.\n';
            }

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: sizeTable,
            });

      - name: Upload analyzer report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bundle-analyzer-report
          path: .next/analyze/
          retention-days: 7
          if-no-files-found: ignore

  # -------------------------------------------------------------------------
  # 9. lighthouse — Lighthouse CI against Vercel preview deployment.
  #
  # NOTE: This job requires three repository secrets to be configured:
  #   VERCEL_TOKEN      — Vercel personal access token
  #   VERCEL_ORG_ID     — Vercel organization/team ID (from vercel inspect)
  #   VERCEL_PROJECT_ID — Vercel project ID (from vercel inspect)
  #
  # If these secrets are absent, the job emits a warning and exits cleanly
  # (continue-on-error: true). Accessibility = 100 is a hard assertion;
  # Performance ≥ 85 and TBT < 200ms are soft warnings only.
  #
  # Skipped on push to main (preview URLs only exist on PRs).
  # -------------------------------------------------------------------------
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/setup-node

      - name: Check required secrets
        id: check-secrets
        run: |
          if [ -z "${{ secrets.VERCEL_TOKEN }}" ] || \
             [ -z "${{ secrets.VERCEL_ORG_ID }}" ] || \
             [ -z "${{ secrets.VERCEL_PROJECT_ID }}" ]; then
            echo "::warning::Lighthouse CI skipped — VERCEL_TOKEN, VERCEL_ORG_ID, or VERCEL_PROJECT_ID secrets are not configured."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Wait for Vercel preview deployment
        id: wait-for-vercel
        if: steps.check-secrets.outputs.skip == 'false'
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10
        continue-on-error: true

      - name: Set preview URL
        if: steps.check-secrets.outputs.skip == 'false' && steps.wait-for-vercel.outputs.url != ''
        run: echo "PREVIEW_URL=${{ steps.wait-for-vercel.outputs.url }}" >> "$GITHUB_ENV"

      - name: Skip if no preview URL
        if: steps.check-secrets.outputs.skip == 'false' && steps.wait-for-vercel.outputs.url == ''
        run: |
          echo "::warning::No Vercel preview URL found after timeout — skipping Lighthouse."
          echo "PREVIEW_URL=" >> "$GITHUB_ENV"

      - name: Install @lhci/cli
        if: steps.check-secrets.outputs.skip == 'false' && env.PREVIEW_URL != ''
        run: pnpm add --global @lhci/cli

      - name: Run Lighthouse CI
        if: steps.check-secrets.outputs.skip == 'false' && env.PREVIEW_URL != ''
        run: |
          lhci autorun \
            --config=.github/workflows/lighthouserc.json \
            --collect.url="${PREVIEW_URL}/" \
            --collect.url="${PREVIEW_URL}/sign-in" \
            --collect.url="${PREVIEW_URL}/w"
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload Lighthouse results
        if: always() && steps.check-secrets.outputs.skip == 'false' && env.PREVIEW_URL != ''
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-results
          path: .lighthouseci/
          retention-days: 7
          if-no-files-found: ignore
